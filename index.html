<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ED Tech</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>
    
    <div class="page-wrapper">
        
        <div class="container">
            <div class="card game-card">

                <h3 class="title text-center">Create Your Player</h3>
                <p class="avatar-title">Choose Avatar</p>

                <div class="row g-4 avatar-grid">

                    <div class="col-md-4">
                        <div class="avatar-card">
                            <img src="image/robot.png" alt="">
                            <p>Robot</p>
                        </div>
                    </div>
                    <div class="col-md-4">
                    <div class="avatar-card">
                        <img src="image/explorer.jpg">
                        <p>Explorer</p>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="avatar-card">
                        <img src="image/hacker kid.jpg">
                        <p>Hacker Kid</p>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="avatar-card">
                        <img src="image/scientest.jpg">
                        <p>Scientist</p>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="avatar-card">
                        <img src="image/astrounot.jpg">
                        <p>Astronaut</p>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <div class="avatar-card">
                        <img src="image/pirate.jpg">
                        <p>Pirate</p>
                        </div>
                    </div>
                </div>

                <div class="mt-4">
                <label>Player Name</label>
                <input type="text" class="form-control game-input" placeholder="Enter your hero name...">
                </div>

                <div class="mt-3">
                <label>Age</label>
                <input type="number" class="form-control game-input" placeholder="How old are you?">
                </div>

                <button class="join-btn mt-4">
                Join the Game
                </button>
            </div>
        </div>
    </div>














    <script src="javascript/bootstrap.bundle.min.js"></script>
    <script src="javascript/script.js"></script>
</body>
</html>
